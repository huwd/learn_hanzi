services:
  app:
    image: ghcr.io/${GHCR_OWNER}/learn_hanzi:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    environment:
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      SOLID_QUEUE_IN_PUMA: "true"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
    volumes:
      - app_storage:/rails/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "X-Forwarded-Proto: https", "http://localhost:80/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  app_storage:
    driver: local
