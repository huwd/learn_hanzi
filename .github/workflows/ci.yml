name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BUNDLE_WITHOUT: development

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: |
          set +e
          bin/brakeman --no-pager
          brakeman_exit=$?
          set -e
          # Exit code 5 means brakeman is outdated — not a security issue, don't fail CI.
          # All other non-zero exit codes indicate real warnings or errors.
          if [ $brakeman_exit -ne 0 ] && [ $brakeman_exit -ne 5 ]; then exit $brakeman_exit; fi

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y curl libjemalloc2 sqlite3

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build assets
        run: bin/rails tailwindcss:build

      - name: Run tests
        env:
          RAILS_ENV: test
        run: bin/rails db:test:prepare && bundle exec rspec

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          languages: ruby

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v3

  build-and-push:
    needs: [scan_ruby, scan_js, lint, test, analyze]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install nginx
        run: sudo apt-get install -y nginx

      - name: Start CF-Access registry proxy
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          # nginx reverse-proxies HTTP from localhost:5000 to the HTTPS registry,
          # injecting CF-Access service token headers so Cloudflare Access accepts
          # the request. cloudflared access tcp cannot do this because it forwards
          # raw TCP bytes — Docker's plain HTTP reaches the HTTPS origin and is reset.
          REGISTRY="${{ vars.REGISTRY }}"
          if [ -z "$REGISTRY" ]; then
            echo "::error::REGISTRY repository variable is not set" >&2
            exit 1
          fi

          cat > /tmp/registry-proxy.conf <<NGINX
          server {
              listen 127.0.0.1:5000;
              client_max_body_size 0;

              location / {
                  proxy_pass              https://${REGISTRY};
                  proxy_ssl_server_name   on;
                  proxy_ssl_name          ${REGISTRY};
                  proxy_http_version      1.1;
                  proxy_set_header        Connection              "";
                  proxy_set_header        Host                    ${REGISTRY};
                  proxy_set_header        CF-Access-Client-Id     "${CF_ACCESS_CLIENT_ID}";
                  proxy_set_header        CF-Access-Client-Secret "${CF_ACCESS_CLIENT_SECRET}";
                  proxy_request_buffering off;
                  proxy_buffering         off;
                  proxy_read_timeout      300s;
                  proxy_send_timeout      300s;
              }
          }
          NGINX

          sudo cp /tmp/registry-proxy.conf /etc/nginx/conf.d/registry-proxy.conf
          sudo rm -f /etc/nginx/sites-enabled/default /etc/nginx/conf.d/default.conf
          sudo nginx -t
          sudo systemctl reload-or-restart nginx

          for i in $(seq 1 30); do
            if bash -c '</dev/tcp/127.0.0.1/5000' 2>/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::Timed out waiting for nginx to bind localhost:5000" >&2
          exit 1

      - name: Debug proxy response
        run: |
          echo "--- Response from /v2/ ---"
          curl -si http://localhost:5000/v2/ | head -30
          echo "--- nginx config ---"
          sudo cat /etc/nginx/conf.d/registry-proxy.conf

      - name: Log in to private registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: localhost:5000
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: localhost:5000/learn_hanzi
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
