name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BUNDLE_WITHOUT: development

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: |
          set +e
          bin/brakeman --no-pager
          brakeman_exit=$?
          set -e
          # Exit code 5 means brakeman is outdated — not a security issue, don't fail CI.
          # All other non-zero exit codes indicate real warnings or errors.
          if [ $brakeman_exit -ne 0 ] && [ $brakeman_exit -ne 5 ]; then exit $brakeman_exit; fi

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y curl libjemalloc2 sqlite3

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build assets
        run: bin/rails tailwindcss:build

      - name: Run tests
        env:
          RAILS_ENV: test
        run: bin/rails db:test:prepare && bundle exec rspec

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3
        with:
          languages: ruby

      - name: Autobuild
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3

  publish:
    name: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [scan_ruby, scan_js, lint, test, analyze]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Allow insecure registry over Tailscale
        run: |
          echo '{"insecure-registries": ["gismo:5000"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: gismo:5000
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate CalVer tag
        id: calver
        run: |
          commit_date="$(TZ=UTC git show -s --format=%cd --date=format-local:%Y.%m.%d "$GITHUB_SHA")"
          echo "tag=${commit_date}-$(echo "$GITHUB_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: |
            gismo:5000/learn_hanzi:latest
            gismo:5000/learn_hanzi:${{ steps.calver.outputs.tag }}

      - name: Redeploy on Portainer
        env:
          PORTAINER_ACCESS_KEY: ${{ secrets.PORTAINER_ACCESS_KEY }}
          PORTAINER_STACK_ID: ${{ vars.PORTAINER_STACK_ID }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import base64, json, urllib.request, os

          PORTAINER = "http://gismo:9000"
          STACK_ID = int(os.environ["PORTAINER_STACK_ID"])
          ENDPOINT_ID = 2

          key = os.environ["PORTAINER_ACCESS_KEY"]
          headers = {"X-API-Key": key, "Content-Type": "application/json"}

          # Pull via 127.0.0.1:5000 — already in the daemon's insecure CIDR,
          # avoids routing through Cloudflare entirely.
          reg_auth = base64.b64encode(json.dumps({
              "username": os.environ["REGISTRY_USERNAME"],
              "password": os.environ["REGISTRY_PASSWORD"],
              "serveraddress": "127.0.0.1:5000",
          }).encode()).decode()
          pull_req = urllib.request.Request(
              f"{PORTAINER}/api/endpoints/{ENDPOINT_ID}/docker/images/create"
              "?fromImage=127.0.0.1:5000/learn_hanzi&tag=latest",
              data=b"",
              headers={"X-API-Key": key, "X-Registry-Auth": reg_auth},
              method="POST",
          )
          with urllib.request.urlopen(pull_req, timeout=120) as resp:
              resp.read()
          print("Image pulled via 127.0.0.1:5000")

          # Fetch env vars stored in Portainer (source of truth for secrets)
          req = urllib.request.Request(f"{PORTAINER}/api/stacks/{STACK_ID}", headers={"X-API-Key": key})
          with urllib.request.urlopen(req, timeout=30) as resp:
              stack = json.load(resp)

          with open("docker-compose.yml") as f:
              compose = f.read()

          # Image is already on the host — no pull needed during stack update
          payload = {"stackFileContent": compose, "env": stack["Env"], "pullImage": False}
          req = urllib.request.Request(
              f"{PORTAINER}/api/stacks/{STACK_ID}?endpointId={ENDPOINT_ID}",
              data=json.dumps(payload).encode(),
              headers=headers,
              method="PUT",
          )
          with urllib.request.urlopen(req, timeout=120) as resp:
              result = json.load(resp)
              print(f"Redeployed learn_hanzi stack (status={result['Status']})")
          PYEOF
