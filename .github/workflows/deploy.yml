name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Verify required repo variables
        env:
          CLOUDFLARE_TEAM: ${{ vars.CLOUDFLARE_TEAM }}
          REGISTRY: ${{ vars.REGISTRY }}
        run: |
          missing=0
          if [ -z "$CLOUDFLARE_TEAM" ]; then
            echo "::error::CLOUDFLARE_TEAM repository variable is not set" >&2
            missing=1
          fi
          if [ -z "$REGISTRY" ]; then
            echo "::error::REGISTRY repository variable is not set" >&2
            missing=1
          fi
          [ "$missing" -eq 0 ]

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Enroll runner in Cloudflare One via WARP
        uses: Boostport/setup-cloudflare-warp@427fc9c04f371e4e0338701954d495c669ae7885 # v1.17.1
        with:
          organization: ${{ vars.CLOUDFLARE_TEAM }}
          auth_client_id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          auth_client_secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Log in to private registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ vars.REGISTRY }}/learn_hanzi
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
