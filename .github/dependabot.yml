version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: weekly
    day: monday
  cooldown:
    default-days: 7
    semver-major-days: 30
    semver-minor-days: 7
    semver-patch-days: 3
  open-pull-requests-limit: 10
  groups:
    ruby-minor-and-patch:
      patterns:
        - "*"
      update-types:
        - "minor"
        - "patch"

- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
    day: monday
  cooldown:
    default-days: 7
  open-pull-requests-limit: 5
  groups:
    github-actions-minor-and-patch:
      patterns:
        - "*"
      update-types:
        - "minor"
        - "patch"
