# Custom dictionary entries curated for HSK vocabulary absent from CC-CEDICT.
#
# Source: learn_hanzi (self-curated). These entries fill gaps where:
#   - HSK treats a multi-character phrase as a single vocabulary item
#   - CC-CEDICT only covers the component characters separately
#   - A word has an 儿化 (erhua) form common in HSK but not in CC-CEDICT
#   - Modern vocabulary post-dating the CC-CEDICT corpus
#
# Format:
#   text:     simplified Chinese (required)
#   meanings: list of at least one meaning (required)
#     - text:    English definition
#       pinyin:  pinyin with tone marks
#
# To add entries: audit log/tag_import_errors.log and log/anki_migration.log.
# See issue #34 for the full categorisation of the ~210 missing entries.
# Do NOT add compositional verb+complement phrases (e.g. 放到, 送到, 看到) —
# these are grammar constructions, not standalone vocabulary.

entries:

  # ---------------------------------------------------------------------------
  # Anki deck items — blocked from UserLearning import by missing DictionaryEntry
  # ---------------------------------------------------------------------------

  - text: 打篮球
    meanings:
      - text: "to play basketball"
        pinyin: "dǎ lánqiú"

  - text: 弹钢琴
    meanings:
      - text: "to play the piano"
        pinyin: "tán gāngqín"

  - text: 系领带
    meanings:
      - text: "to tie a necktie; to put on a tie"
        pinyin: "jì lǐngdài"

  - text: 纽扣儿
    meanings:
      - text: "button (on clothing)"
        pinyin: "niǔ kòur"

  - text: 放暑假
    meanings:
      - text: "to have a summer holiday; to break for summer"
        pinyin: "fàng shǔjià"

  # ---------------------------------------------------------------------------
  # 儿化 (erhua) variants — Beijing dialect forms used in HSK vocab lists
  # Base forms exist in CC-CEDICT; these variants are the HSK-listed forms.
  # ---------------------------------------------------------------------------

  - text: 不一会儿
    meanings:
      - text: "in a moment; shortly; before long"
        pinyin: "bù yī huìr"

  - text: 笑话儿
