        pinyin: "méi fǎr"

  - text: 名牌儿
    meanings:
      - text: "famous brand; name brand"
        pinyin: "míng páir"

  - text: 胡同儿
    meanings:
      - text: "hutong; lane; alley (Beijing dialect)"
        pinyin: "hútòngr"

  - text: 小偷儿
    meanings:
      - text: "thief; pickpocket"
        pinyin: "xiǎo tōur"

  - text: 大腕儿
    meanings:
